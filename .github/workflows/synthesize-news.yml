name: Weekly Tech Synthesis

on:
  schedule:
    - cron: '0 7 * * 1'  # every Monday 07:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  synthesize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate weekly synthesis
        run: python scripts/synthesize_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: weekly tech synthesis — $(date +%G-W%V)" && git push
