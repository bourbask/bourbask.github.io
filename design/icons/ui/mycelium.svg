<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bare deciduous tree (winter) — branching network for veille -->
  <!-- Trunk -->
  <line x1="12" y1="22" x2="12" y2="15"/>
  <!-- Main branches -->
  <path d="M12 15 L7  10"/>
  <path d="M12 15 L18 11"/>
  <!-- Left sub-branches -->
  <path d="M7 10 L4.5 7"/>
  <path d="M7 10 L9   7"/>
  <!-- Right sub-branches -->
  <path d="M18 11 L16 7"/>
  <path d="M18 11 L21 8"/>
  <!-- Center vertical shoot -->
  <path d="M12 14 L11 9"/>
  <path d="M11 9 L9.5 6"/>
  <path d="M11 9 L13 6"/>
</svg>
