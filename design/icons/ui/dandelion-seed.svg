<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Dandelion seed falling = download arrow -->
  <!-- Achene (seed body) at top -->
  <circle cx="12" cy="7" r="0.9" fill="currentColor" stroke="none"/>
  <!-- Pappus filaments (5) -->
  <line x1="12" y1="7" x2="9"    y2="3.5" stroke-width="0.9"/>
  <line x1="12" y1="7" x2="10.5" y2="2.5" stroke-width="0.9"/>
  <line x1="12" y1="7" x2="12"   y2="2"   stroke-width="0.9"/>
  <line x1="12" y1="7" x2="13.5" y2="2.5" stroke-width="0.9"/>
  <line x1="12" y1="7" x2="15"   y2="3.5" stroke-width="0.9"/>
  <!-- Tip dots -->
  <circle cx="9"    cy="3.5" r="0.65" fill="currentColor" stroke="none"/>
  <circle cx="10.5" cy="2.5" r="0.65" fill="currentColor" stroke="none"/>
  <circle cx="12"   cy="2"   r="0.65" fill="currentColor" stroke="none"/>
  <circle cx="13.5" cy="2.5" r="0.65" fill="currentColor" stroke="none"/>
  <circle cx="15"   cy="3.5" r="0.65" fill="currentColor" stroke="none"/>
  <!-- Stem = arrow shaft -->
  <line x1="12" y1="8" x2="12" y2="16"/>
  <!-- Arrowhead pointing down -->
  <polyline points="7 12 12 17 17 12"/>
  <!-- Tray (standard download indicator) -->
  <line x1="5"  y1="22" x2="19" y2="22"/>
  <line x1="5"  y1="22" x2="5"  y2="19"/>
  <line x1="19" y1="22" x2="19" y2="19"/>
</svg>
