<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found - Kevin Bourbasquet</title>
    <meta
      name="description"
      content="Oops! The page you're looking for doesn't exist."
    />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/icons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/icons/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/icons/site.webmanifest" />
    <link rel="shortcut icon" href="assets/icons/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* =================================
         CSS VARIABLES - THEME SYSTEM
         ================================= */

      /* Light theme variables */
      :root[data-theme="light"] {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border-color: #e2e8f0;
        --accent-primary: #4ade80;
        --accent-secondary: #22c55e;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      }

      /* Dark theme variables */
      :root[data-theme="dark"] {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-tertiary: #334155;
        --text-primary: #f8fafc;
        --text-secondary: #cbd5e1;
        --border-color: #334155;
        --accent-primary: #4ade80;
        --accent-secondary: #22c55e;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      }

      /* =================================
         404 PAGE SPECIFIC STYLES
         ================================= */

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: "Inter", sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .error-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        padding: 2rem;
        position: relative;
        overflow: hidden;
        min-height: calc(100vh - 160px);
      }

      .error-page::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at 30% 20%,
          rgba(74, 222, 128, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .error-container {
        max-width: 800px;
        width: 100%;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .error-code {
        font-size: 8rem;
        font-weight: 800;
        margin-bottom: 1rem;
        background: linear-gradient(
          135deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: float 3s ease-in-out infinite;
      }

      .error-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: var(--text-primary);
        animation: fadeInUp 0.6s ease-out;
      }

      .error-message {
        font-size: 1.2rem;
        color: var(--text-secondary);
        margin-bottom: 3rem;
        line-height: 1.6;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        animation: fadeInUp 0.6s ease-out 0.1s both;
      }

      .error-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeInUp 0.6s ease-out 0.2s both;
      }

      .error-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        font-family: "Inter", sans-serif;
      }

      .error-btn-primary {
        background: var(--accent-primary);
        color: white;
        box-shadow: var(--shadow-lg);
      }

      .error-btn-primary:hover {
        background: var(--accent-secondary);
        transform: translateY(-2px);
        box-shadow: var(--shadow-xl);
      }

      .error-btn-secondary {
        background: transparent;
        color: var(--text-primary);
        border: 2px solid var(--border-color);
      }

      .error-btn-secondary:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
        transform: translateY(-2px);
      }

      /* Floating animations */
      .floating-element {
        position: absolute;
        pointer-events: none;
        opacity: 0.6;
        font-size: 3rem;
      }

      .floating-404-1 {
        top: 20%;
        right: 10%;
        animation: float 4s ease-in-out infinite;
      }

      .floating-404-2 {
        bottom: 30%;
        left: 15%;
        font-size: 2.5rem;
        animation: float 5s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        25% {
          transform: translateY(-10px) rotate(1deg);
        }
        50% {
          transform: translateY(-20px) rotate(0deg);
        }
        75% {
          transform: translateY(-10px) rotate(-1deg);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Footer */
      .footer {
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
        padding: 2rem 0;
        text-align: center;
        margin-top: auto;
      }

      .footer .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }

      .footer-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .footer p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .footer-links {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .footer-links a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .footer-links a:hover {
        color: var(--accent-primary);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .error-code {
          font-size: 6rem;
        }

        .error-title {
          font-size: 2rem;
        }

        .error-message {
          font-size: 1rem;
        }

        .error-actions {
          flex-direction: column;
          align-items: center;
        }

        .floating-element {
          display: none;
        }

        .error-page {
          min-height: calc(100vh - 120px);
          padding: 1rem;
        }

        .footer-links {
          flex-direction: column;
          gap: 0.5rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- Floating elements -->
    <div class="floating-element floating-404-1">🔍</div>
    <div class="floating-element floating-404-2">🤖</div>

    <div class="error-page">
      <div class="error-container">
        <div class="error-code">404</div>

        <h1 class="error-title" id="errorTitle">Page Not Found</h1>

        <p class="error-message" id="errorMessage">
          Oops! The page you're looking for seems to have vanished into the
          digital void.
        </p>

        <div class="error-actions">
          <a href="/" class="error-btn error-btn-primary" id="homeBtn">
            <span>🏠</span>
            <span id="homeBtnText">Go Home</span>
          </a>
          <a href="/blog/" class="error-btn error-btn-secondary" id="blogBtn">
            <span>📝</span>
            <span id="blogBtnText">Explore Blog</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <p>
            <span id="madeWith">Made with</span> ❤️
            <span id="by">by</span> Kévin Bourbasquet
          </p>
          <div class="footer-links">
            <a
              href="https://github.com/bourbask/bourbask.github.io"
              target="_blank"
              id="sourceCode"
            >
              Source Code
            </a>
            •
            <a
              href="https://github.com/bourbask/bourbask.github.io/blob/main/LICENSE"
              target="_blank"
            >
              MIT License
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script>
      // Restore theme and language from localStorage
      (function () {
        // Restore theme
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);

        // Restore language
        const savedLang = localStorage.getItem("language") || "en";
        document.documentElement.lang = savedLang;

        // Check if this is a blog-related 404
        const currentPath = window.location.pathname;
        const isBlogPath =
          currentPath.startsWith("/blog/") &&
          currentPath !== "/blog/" &&
          currentPath !== "/blog/index.html";

        // Update content based on language and context
        const translations = {
          fr: {
            title: isBlogPath ? "Article Introuvable" : "Page Introuvable",
            message: isBlogPath
              ? "Désolé, cet article n'existe pas ou a été supprimé."
              : "Oups ! La page que vous cherchez semble avoir disparu dans le vide numérique.",
            homeBtn: "Accueil",
            blogBtn: "Explorer le Blog",
            madeWith: "Fait avec",
            by: "par",
            sourceCode: "Code Source",
          },
          en: {
            title: isBlogPath ? "Article Not Found" : "Page Not Found",
            message: isBlogPath
              ? "Sorry, this article doesn't exist or has been removed."
              : "Oops! The page you're looking for seems to have vanished into the digital void.",
            homeBtn: "Go Home",
            blogBtn: "Explore Blog",
            madeWith: "Made with",
            by: "by",
            sourceCode: "Source Code",
          },
        };

        const t = translations[savedLang] || translations.en;

        // Update page title and content
        document.title = `404 - ${t.title} - Kevin Bourbasquet`;
        document.getElementById("errorTitle").textContent = t.title;
        document.getElementById("errorMessage").textContent = t.message;
        document.getElementById("homeBtnText").textContent = t.homeBtn;
        document.getElementById("blogBtnText").textContent = t.blogBtn;
        document.getElementById("madeWith").textContent = t.madeWith;
        document.getElementById("by").textContent = t.by;
        document.getElementById("sourceCode").textContent = t.sourceCode;
      })();
    </script>
  </body>
</html>
