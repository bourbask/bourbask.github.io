    <!-- SPA routing: restore path stored by 404.html redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>

    <!-- Anti-FOUC: apply stored theme before first paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('portfolio_theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(t + '-theme');
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>

    <!-- OpenPGP.js — client-side encryption for contact form -->
    <script src="https://unpkg.com/openpgp@5.11.2/dist/openpgp.min.js" integrity="sha384-GSfnO+LcQAKSCm1NYG2u/acMR+jBE5ML42eWq3lKjR0Dglq3Zp4dWI3K319/7zmD" crossorigin="anonymous"></script>
    <script>
      window.encryptWithPgp = async function (publicKeyArmored, plaintext) {
        const publicKey = await openpgp.readKey({ armoredKey: publicKeyArmored });
        const encrypted = await openpgp.encrypt({
          message: await openpgp.createMessage({ text: plaintext }),
          encryptionKeys: publicKey,
        });
        return encrypted;
      };
    </script>
